<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação</title>
</head>
<body>
    <form>
    
    <h2>Identificação do Usuário</h2>
    
    <p>
        <label for="nome">Nome*:</label>
        <input type="text" id="nome" name="nome" required>
    </p>

    <p>
        <label for="senha">Senha*:</label>
        <input type="password" id="senha" name="senha" required>
    </p>

    <p>
        <label for="cpf">CPF*:</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
    </p>

    <p>
        Sexo*: <br>
        <input type="radio" id="masc" name="sexo" value="M"> <label for="masc">Masculino</label> <br>
        <input type="radio" id="fem" name="sexo" value="F"> <label for="fem">Feminino</label>
    </p>

    <p>
        <label for="data">Data Nascimento*:</label>
        <input type="date" id="data" name="data" required>
    </p>

    <h2>Localização</h2>
    <p>
        <label for="estado">Estado*:</label>
        <input type="text" id="estado" name="estado" required><br><br>
    </p>

    <h2>Mensagem do Usuário</h2>
    <p>
        <label for="erro">Reportar Erro:</label>
        <input type="file" id="erro" name="arquivo"> </p>

    <div class="botoes">
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </div>

    <small>*Preenchimento obrigatório</small>

</form>
</body>
</html>
