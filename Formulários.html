<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Manutenção de Usuários do sistema interno</h1>

 <!---Login, Senha e Status-->
    <form>
        <p>
            <label for="login">Login</label>
            <input type="text" name="login" id="login">
        </p>

        <p>
            <label for="senha">Senha</label>
            <input type="text" name="senha" id="senha">
        </p>
        <p>
            <label for="status">Status</label>
            <select name="status" id="status">
                <option value="inativo">Inativo</option>
                <option value="Ativo">Ativo</option>
            </select>
        </p>
    </form>



<!--Tipo: Técnico, Professor e Aluno-->
    <form >
        <p>
            Tipo
            <input type="radio" value="tecnico" name="tecnico" id="tecnico">
             <label for="tecnico">Técnico</label>

            <input type="radio" value="professor" name="professor" id="professor">
            <label for="professor">Professor</label>

            <input type="radio" value="aluno" name="aluno" id="aluno">
            <label for="aluno">Aluno</label>

<!--Data de criação-->
        </p>
        <p>
            Data de criação
            <input type="text" name="data" id="data">
       </p>

<!--Perfil: Convidado e Administrador-->
       <form>
       <p>
            Perfil
            <input type="radio" value="convidado" name="convidado" id="convidado">
            <label for="convidado">Convidado</label>
            <input type="radio" value="administrador" name="administrador
            " id="administrador">
            <label for="administrador">Administrador</label>
        </p>
        </form>

<!--Observações-->
        <form>
            <style>
                textarea{
                    resize: none;
                }

                .campo-obs{
                    display: flex;
        align-items: flex-start;
        gap: 10px;
        align-items: center;
                }
            </style>
            <div class="campo-obs">
                <label for="observacoes">Observações</label>
                <textarea name="obs" rows="4" cols="40"></textarea>
            </div>
        </form>

<!--Módulos: Compras, Bilioteca, Acadêmico, Documentação e Recursos Humanos -->
        <form>
            <style>
                .modulo-container{
                    display: flex;
                    align-items: flex-start; 
                    gap: 15px;
                    margin-top: 20px;

                }
                .titulo-secao {
                 width: 70px;
  
                }

                .opcoes-grupo {
                display: flex;

                }

            </style>
        <form>

            <div class="modulo-container">
               <label class="titulo-secao">Módulos</label>

               <div class="opcoes-grupo">
               <div class="linha-check">

                <input type="checkbox" id="compras" name="modulo" value="compras">
                <label for="compras">Compras</label>
                <input type="checkbox" id="biblioteca" name="modulo" value="biblioteca">
                <label for="biblioteca">Biblioteca</label>
                <input type="checkbox" id="academico" name="modulo" value="academico">
                <label for="academico">Acadêmico</label><br><br>
                <input type="checkbox" id="documentacao" name="modulo" value="documentacao">
                <label for="documentacao">Documentação</label>
                <input type="checkbox" id="recursos humanos" name="modulo" value="rh">
                <label for="recursos humanos">Recursos Humanos</label>
            </p>

            <button type="submit">Cadastrar</button>
            <button type="reset">Excluir</button>

        </form>


</body>
</html>
